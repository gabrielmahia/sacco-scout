name: Notify portfolio on deploy

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portfolio rebuild
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/gabrielmahia/gabrielmahia.github.io/dispatches" \
            -d '{"event_type":"app_updated","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
          echo "Portfolio notified by ${{ github.repository }}"
